version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: tcpchat-postgres
    restart: always
    environment:
      POSTGRES_DB: TcpChatDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d TcpChatDb"]
      interval: 5s
      timeout: 2s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Chat.Server/Dockerfile

    container_name: tcpchat-server

    restart: always

    environment:
      DB_CONNECTION_STRING: "Host=postgres;Database=TcpChatDb;Username=postgres;Password=postgres"

    ports:
      - "5000:5000"

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
