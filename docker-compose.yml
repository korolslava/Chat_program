services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: TcpChatDb
    ports:
      - "5432:5432"

  chat-server:
    build:
      context: .
      dockerfile: Chat.Server/Dockerfile
    depends_on:
      - db
    environment:
      - DB_CONNECTION_STRING=Host=db;Database=TcpChatDb;Username=postgres;Password=postgres
    ports:
      - "5000:5000"